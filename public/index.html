<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearl – Your Personal Companion</title>
<script src="https://cdn.jsdelivr.net/npm/@heygen/liveavatar-web-sdk@latest/dist/index.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(150deg, #fdf8f2 0%, #f0e4d4 50%, #e8d4c0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 {
    font-size: 2rem;
    color: #3a2e24;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .tagline {
    color: #7a6248;
    font-style: italic;
    margin-bottom: 24px;
    font-size: 1rem;
  }
  #avatar-container {
    width: 480px;
    height: 360px;
    border-radius: 20px;
    overflow: hidden;
    background: #1a1a1a;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(100,70,30,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #avatar-container video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #status {
    color: #7a6248;
    font-style: italic;
    margin-bottom: 16px;
    min-height: 24px;
  }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }
  button {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  #start-btn {
    background: #c9897a;
    color: white;
  }
  #start-btn:hover { background: #b07060; }
  #mic-btn {
    background: #7a6248;
    color: white;
    display: none;
  }
  #mic-btn:hover { background: #5a4230; }
  #mic-btn.listening { background: #a05050; }
  .chat-box {
    width: 480px;
    max-height: 200px;
    overflow-y: auto;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: 16px;
    font-size: 0.9rem;
    color: #3a2e24;
    line-height: 1.5;
  }
  .msg { margin-bottom: 8px; }
  .msg.user { color: #7a6248; font-weight: bold; }
  .msg.pearl { color: #3a2e24; }
</style>
</head>
<body>

<h1>Pearl</h1>
<p class="tagline">Always here. Always listening.</p>

<div id="avatar-container">
  <div id="status">Click "Meet Pearl" to begin</div>
</div>

<div class="controls">
  <button id="start-btn" onclick="startSession()">Meet Pearl</button>
  <button id="mic-btn" onclick="toggleMic()">🎤 Speak</button>
</div>

<div class="chat-box" id="chat-box"></div>

<script>
let avatar = null;
let mediaRecorder = null;
let audioChunks = [];
let listening = false;

const SYSTEM_PROMPT = `You are Pearl, a warm and caring AI companion designed for adults over 60. 
You speak slowly, clearly, and with genuine warmth. You remember what people tell you and always 
make them feel heard and valued. You never use technical jargon. Keep responses conversational 
and under 3 sentences unless asked for more. You are patient, kind, and never rush anyone.`;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function addMessage(role, text) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = (role === 'user' ? 'You: ' : 'Pearl: ') + text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function startSession() {
  setStatus('Connecting to Pearl...');
  document.getElementById('start-btn').disabled = true;

  try {
    const res = await fetch('/api/session', { method: 'POST' });
    const data = await res.json();

    if (!data.token && !data.sessionId) {
      setStatus('Could not connect. Please try again.');
      document.getElementById('start-btn').disabled = false;
      return;
    }

    avatar = new LiveAvatar.StreamingAvatar({
      token: data.token || data.access_token,
    });

    avatar.on('avatar_start_talking', () => setStatus('Pearl is speaking...'));
    avatar.on('avatar_stop_talking', () => setStatus('Your turn — click Speak'));

    const container = document.getElementById('avatar-container');
    container.innerHTML = '';
    await avatar.createStartAvatar({
      avatarName: '513fd1b7-7ef9-466d-9af2-344e51eeb833',
      quality: 'medium',
      container: container,
    });

    setStatus('Pearl is ready!');
    document.getElementById('mic-btn').style.display = 'inline-block';

    // Pearl greets the user
    await sendToPearl("Hello! Please greet the user warmly and introduce yourself as Pearl.");

  } catch (e) {
    console.error(e);
    setStatus('Connection error: ' + e.message);
    document.getElementById('start-btn').disabled = false;
  }
}

async function sendToPearl(userText) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 200,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userText }]
      })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    addMessage('pearl', reply);
    await avatar.speak({ text: reply, task_type: 'REPEAT' });
  } catch (e) {
    console.error(e);
    setStatus('Error getting response.');
  }
}

async function toggleMic() {
  if (listening) {
    stopListening();
  } else {
    startListening();
  }
}

async function startListening() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = transcribeAndSend;
    mediaRecorder.start();
    listening = true;
    const btn = document.getElementById('mic-btn');
    btn.textContent = '⏹ Stop';
    btn.classList.add('listening');
    setStatus('Listening...');
  } catch (e) {
    setStatus('Microphone access denied.');
  }
}

function stopListening() {
  if (mediaRecorder) mediaRecorder.stop();
  listening = false;
  const btn = document.getElementById('mic-btn');
  btn.textContent = '🎤 Speak';
  btn.classList.remove('listening');
  setStatus('Processing...');
}

async function transcribeAndSend() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-1');

  try {
    // Use browser speech recognition as fallback
    const text = await browserSpeechFallback();
    if (text) {
      addMessage('user', text);
      await sendToPearl(text);
    }
  } catch (e) {
    setStatus('Could not understand. Try again.');
  }
}

function browserSpeechFallback() {
  return new Promise((resolve, reject) => {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.onresult = e => resolve(e.results[0][0].transcript);
    recognition.onerror = reject;
    recognition.start();
  });
}
</script>
</body>
</html>
