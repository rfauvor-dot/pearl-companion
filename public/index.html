<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/pearl-icon.jpg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(150deg, #fdf8f2 0%, #f0e4d4 50%, #e8d4c0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 { font-size: 2rem; color: #3a2e24; margin-bottom: 4px; letter-spacing: 1px; }
  .tagline { color: #7a6248; font-style: italic; margin-bottom: 24px; font-size: 1rem; }
  .avatar-wrapper {
    width: 100%;
   max-width: 390px
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(100,70,30,0.18);
  }
  .avatar-wrapper iframe {
    width: 100%;
    aspect-ratio: 9/16
    border: none;
    display: block;
  }
  .footer {
    margin-top: 16px;
    color: #7a6248;
    font-style: italic;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<h1>Pearl</h1>
<p class="tagline">Always here. Always listening.</p>

<div class="avatar-wrapper">
  <iframe src="https://embed.liveavatar.com/v1/0011d03d-90da-4976-88aa-655676a32177?orientation=horizontal" allow="microphone" title="LiveAvatar Embed"></iframe>
</div>

<p class="footer">Pearl — Your personal AI companion</p>

</body>
</html>
