<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearl – Your Personal Companion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: linear-gradient(150deg, #fdf8f2 0%, #f0e4d4 50%, #e8d4c0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  h1 { font-size: 2rem; color: #3a2e24; margin-bottom: 4px; }
  .tagline { color: #7a6248; font-style: italic; margin-bottom: 24px; }
  #avatar-container {
    width: 480px;
    height: 360px;
    border-radius: 20px;
    overflow: hidden;
    background: #1a1a1a;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(100,70,30,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-style: italic;
  }
  #avatar-container video { width: 100%; height: 100%; object-fit: cover; }
  #status { color: #7a6248; font-style: italic; margin-bottom: 16px; min-height: 24px; }
  .controls { display: flex; gap: 12px; margin-bottom: 20px; }
  button {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    cursor: pointer;
  }
  #start-btn { background: #c9897a; color: white; }
  #start-btn:disabled { background: #ccc; }
  #mic-btn { background: #7a6248; color: white; display: none; }
  #mic-btn.listening { background: #a05050; }
  .chat-box {
    width: 480px;
    max-height: 180px;
    overflow-y: auto;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    padding: 16px;
    font-size: 0.9rem;
    color: #3a2e24;
    line-height: 1.5;
  }
  .msg { margin-bottom: 8px; }
  .msg.user { color: #7a6248; font-weight: bold; }
</style>
</head>
<body>

<h1>Pearl</h1>
<p class="tagline">Always here. Always listening.</p>
<div id="avatar-container">Click "Meet Pearl" to begin</div>
<div id="status"></div>

<div class="controls">
  <button id="start-btn" onclick="startSession()">Meet Pearl</button>
  <button id="mic-btn" id="mic-btn" onclick="toggleMic()">🎤 Speak</button>
</div>

<div class="chat-box" id="chat-box"></div>

<script type="module">
import { LiveAvatarSession } from 'https://esm.sh/@heygen/liveavatar-web-sdk';

let session = null;
let recognition = null;
let listening = false;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function addMessage(role, text) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = (role === 'user' ? 'You: ' : 'Pearl: ') + text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

window.startSession = async function() {
  setStatus('Connecting to Pearl...');
  document.getElementById('start-btn').disabled = true;

  try {
    const res = await fetch('/api/session', { method: 'POST' });
    const data = await res.json();
    console.log('Session response:', data);

    const token = data?.data?.session_token || data?.token || data?.session_token;
    if (!token) {
      setStatus('Could not get session token. Check console.');
      document.getElementById('start-btn').disabled = false;
      return;
    }

    const container = document.getElementById('avatar-container');
    container.innerHTML = '';

    session = new LiveAvatarSession(token, { voiceChat: false });

    session.on('stream', (stream) => {
      const video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = true;
      video.playsInline = true;
      container.appendChild(video);
      setStatus('Pearl is ready!');
      document.getElementById('mic-btn').style.display = 'inline-block';
    });

    await session.start();

  } catch(e) {
    console.error('Session error:', e);
    setStatus('Error: ' + e.message);
    document.getElementById('start-btn').disabled = false;
  }
}

window.toggleMic = function() {
  if (listening) {
    recognition && recognition.stop();
    listening = false;
    document.getElementById('mic-btn').textContent = '🎤 Speak';
    document.getElementById('mic-btn').classList.remove('listening');
  } else {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.onresult = async (e) => {
      const text = e.results[0][0].transcript;
      addMessage('user', text);
      setStatus('Pearl is thinking...');
      await sendToClaude(text);
    };
    recognition.start();
    listening = true;
    document.getElementById('mic-btn').textContent = '⏹ Stop';
    document.getElementById('mic-btn').classList.add('listening');
    setStatus('Listening...');
  }
}

async function sendToClaude(userText) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 150,
        system: 'You are Pearl, a warm caring AI companion for adults over 60. Speak warmly and briefly — under 2 sentences.',
        messages: [{ role: 'user', content: userText }]
      })
    });
    const data = await res.json();
    const reply = data.content[0].text;
    addMessage('pearl', reply);
    if (session) await session.speak(reply);
    setStatus('Your turn — click Speak');
  } catch(e) {
    console.error(e);
    setStatus('Error getting response.');
  }
}
</script>
</body>
</html>
